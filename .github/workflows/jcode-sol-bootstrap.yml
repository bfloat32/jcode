name: jcode-sol bootstrap

on:
  push:
    branches:
      - jcode-sol
  pull_request:
    branches:
      - jcode-sol-ci-base
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jcode-sol-bootstrap
  cancel-in-progress: false

jobs:
  refactor-and-validate:
    if: github.event_name != 'pull_request' || github.head_ref == 'jcode-sol'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out solution branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: jcode-sol

      - name: Fetch every fork branch and canonical upstream tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          git remote add upstream https://github.com/1jehuang/jcode.git 2>/dev/null || \
            git remote set-url upstream https://github.com/1jehuang/jcode.git
          git fetch upstream master --tags --prune
          test "$(git rev-parse 'v0.40.0^{commit}')" = "c5e7c88324a3b4fd7d09557a042e86cd2a07846d"
          git merge-base --is-ancestor c5e7c88324a3b4fd7d09557a042e86cd2a07846d HEAD

          # Mirror canonical tags without making a tag collision block the code build.
          if ! git push origin --tags; then
            echo '::warning::One or more pre-existing fork tags differ from upstream; code validation will continue.'
          fi

      - name: Install current stable Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Apply guarded jcode-sol refactor
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/jcode_sol_refactor.py 2>&1 | tee jcode-sol-refactor.log
          cargo fmt --all 2>&1 | tee -a jcode-sol-refactor.log
          cargo generate-lockfile 2>&1 | tee -a jcode-sol-refactor.log

      - name: Capture refactor diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          git status --short > jcode-sol-status.txt
          git diff --stat > jcode-sol-diff-stat.txt
          git diff > jcode-sol-refactor.patch
          printf 'HEAD=%s\n' "$(git rev-parse HEAD)" > jcode-sol-run-context.txt
          printf 'event=%s\n' "${{ github.event_name }}" >> jcode-sol-run-context.txt

      - name: Upload refactor diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jcode-sol-diagnostics-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            jcode-sol-refactor.log
            jcode-sol-status.txt
            jcode-sol-diff-stat.txt
            jcode-sol-refactor.patch
            jcode-sol-run-context.txt
            docs/JCODE_SOL.md
            docs/JCODE_SOL_BRANCH_REVIEW.md

      - name: Check lean application build
        shell: bash
        run: |
          set -euo pipefail
          cargo check -p jcode --all-targets --no-default-features

      - name: Test privacy and provider boundaries
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p jcode-telemetry-core
          cargo test -p jcode-provider-metadata

      - name: Record validation and publish cohesive result
        shell: bash
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          cat > docs/JCODE_SOL_VALIDATION.md <<EOF
          # jcode-sol validation

          The guarded transformation completed successfully on GitHub Actions.

          - Base: upstream v0.40.0 at c5e7c88324a3b4fd7d09557a042e86cd2a07846d
          - Formatting: cargo fmt --all
          - Lockfile: regenerated by Cargo
          - Build: cargo check -p jcode --all-targets --no-default-features
          - Tests: jcode-telemetry-core and jcode-provider-metadata
          - Workflow: ${RUN_URL}
          EOF

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes to publish.'
          else
            git commit -m 'refactor(jcode-sol): apply privacy-first OpenAI/local core'
            git push origin HEAD:jcode-sol
          fi
